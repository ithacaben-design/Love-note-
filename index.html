<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #ffff88;
            --bg-color: #f4f4f4;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Caveat', cursive;
        }

        /* The Container */
        .scene {
            position: relative;
            width: 300px;
            height: 300px;
            perspective: 1000px;
        }

        /* The Post-it Note */
        .note {
            width: 250px;
            height: 250px;
            background: var(--paper-color);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.5s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .message {
            font-size: 2.5rem;
            color: #333;
            opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }

        /* Animation: Folding into Airplane */
        .fold-and-fly {
            animation: 
                fold 1.5s forwards 4s,
                flyAway 3s forwards 5.5s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fold {
            0% { clip-path: inset(0 0 0 0); }
            100% { 
                clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
                background: #eee; /* Looks more like white paper when folded */
                transform: translate(-50%, -50%) rotateX(30deg) scale(0.6);
            }
        }

        @keyframes flyAway {
            0% { transform: translate(-50%, -50%) rotateX(30deg) scale(0.6); }
            20% { transform: translate(-40%, -60%) rotateZ(-10deg) scale(0.5); }
            100% { transform: translate(500%, -500%) rotateZ(-45deg) scale(0.1); opacity: 0; }
        }

        /* The Return Note (Text Area) */
        .reply-area {
            display: none;
            width: 250px;
            height: 250px;
            background: white;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            padding: 15px;
            flex-direction: column;
            animation: fadeIn 1s forwards;
        }

        textarea {
            width: 100%;
            height: 80%;
            border: none;
            resize: none;
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            outline: none;
        }

        button {
            align-self: flex-end;
            background: #333;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            font-size: 0.8rem;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="scene">
        <div id="loveNote" class="note">
            <div class="message">I love you</div>
        </div>

        <div id="replyNote" class="reply-area">
            <textarea placeholder="Write back..."></textarea>
            <button onclick="sendReply()">Send back</button>
        </div>
    </div>

    <script>
        const note = document.getElementById('loveNote');
        const reply = document.getElementById('replyNote');

        // Start the folding/flying sequence immediately
        note.classList.add('fold-and-fly');

        // Show the reply box after the airplane leaves (approx 8.5 seconds total)
        setTimeout(() => {
            note.style.display = 'none';
            reply.style.display = 'flex';
        }, 8500);

        function sendReply() {
            reply.style.opacity = '0';
            setTimeout(() => {
                alert("Message Sent!");
                // Here is where you could trigger a mailto: or API call
            }, 1000);
        }
    </script>
</body>
</html>
